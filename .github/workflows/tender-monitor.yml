name: Tender Monitor

on:
  schedule:
    - cron: '0 5,11 * * 1-5'
  workflow_dispatch:
    inputs:
      cpv:
        description: 'CPV codes comma separated'
        required: false
        type: string

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch tenders
        id: fetch
        run: |
          python3 scripts/fetch_tenders.py ${{ github.event.inputs.cpv || '' }} > /tmp/tenders.json 2>/tmp/fetch.log
          cat /tmp/fetch.log
          echo "count=$(python3 -c 'import json; print(len(json.load(open("/tmp/tenders.json"))))')" >> $GITHUB_OUTPUT

      - name: Save report
        run: |
          mkdir -p reports
          ts=$(date +%Y%m%d_%H%M)
          cp /tmp/tenders.json "reports/tenders_${ts}.json"
          ls -t reports/tenders_*.json | tail -n +31 | xargs -r rm

      - name: Create issue if tenders found
        if: steps.fetch.outputs.count > 0
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 -c "
import json
with open('/tmp/tenders.json') as f:
    data = json.load(f)
lines = [f'# Tender Monitor - {len(data)} finds\n']
for r in data:
    lines.append(f'## [{r['cpv']}] {r['title']}')
    lines.append(f'- Category: {r['category']}')
    lines.append(f'- URL: {r['url']}')
    if r.get('deadline'):
        lines.append(f'- Deadline: {r['deadline']}')
    lines.append('')
body = '\n'.join(lines)
print(body)
" > /tmp/issue_body.md
          gh issue create --title "Tender Monitor $(date +%d.%m.%Y)" --label tenders --body-file /tmp/issue_body.md --repo ${{ github.repository }}

      - name: Notify Telegram
        if: steps.fetch.outputs.count > 0
        env:
          TG_BOT: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python3 -c "
import json, urllib.request

with open('/tmp/tenders.json') as f:
    data = json.load(f)

msg = f'\U0001F4CB *Tender Monitor — {len(data)} finds*\n\n'
for r in data:
    msg += f'\U0001F4DD *[{r[\"cpv\"]}]* {r[\"title\"]}\n'
    msg += f'\U0001F4C2 {r[\"category\"]}\n'
    msg += f'\U0001F517 {r[\"url\"]}\n'
    if r.get('deadline'):
        msg += f'\U0001F4C5 {r[\"deadline\"]}\n'
    msg += '\n'

msg += f'\n_Automated via GitHub Actions ({__import__(\"datetime\").datetime.utcnow().strftime(\"%d.%m.%Y %H:%M\")} UTC)_'

url = f'https://api.telegram.org/bot{urllib.parse.quote(os.environ[\"TG_BOT\"])}/sendMessage'
data = urllib.parse.urlencode({
    'chat_id': os.environ['TG_CHAT'],
    'text': msg,
    'parse_mode': 'Markdown',
    'disable_web_page_preview': 'true'
}).encode()

req = urllib.request.Request(url, data=data, method='POST')
# Fix: need os import
" 2>&1 || echo "Telegram notify failed (missing secrets?)"
          # Separate run for the actual notification
          python3 << 'PYEOF'
import json, urllib.request, urllib.parse, os

with open('/tmp/tenders.json') as f:
    data = json.load(f)

msg = f'📋 *Tender Monitor — {len(data)} finds*\n\n'
for r in data:
    msg += f'📝 *[{r["cpv"]}]* {r["title"]}\n'
    msg += f'📂 {r["category"]}\n'
    msg += f'🔗 {r["url"]}\n'
    if r.get('deadline'):
        msg += f'📅 {r["deadline"]}\n'
    msg += '\n'

msg += f'\n_Automated via GitHub Actions_'

bot_token = os.environ.get('TG_BOT', '')
chat_id = os.environ.get('TG_CHAT', '')

if bot_token and chat_id:
    url = f'https://api.telegram.org/bot{bot_token}/sendMessage'
    payload = urllib.parse.urlencode({
        'chat_id': chat_id,
        'text': msg,
        'parse_mode': 'Markdown',
        'disable_web_page_preview': 'true'
    }).encode()
    req = urllib.request.Request(url, data=payload, method='POST')
    resp = urllib.request.urlopen(req)
    result = json.loads(resp.read())
    if result.get('ok'):
        print('Telegram notification sent')
    else:
        print(f'Telegram API error: {result}')
else:
    print('TELEGRAM_BOT_TOKEN or TELEGRAM_CHAT_ID not set — skipping Telegram notify')
PYEOF
